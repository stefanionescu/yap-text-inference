allowed_exact = [
    "Apache Software License",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD License",
    "Expat license",
    "ISC",
    "MIT",
    "MIT License",
    "MPL-2.0",
    "Python Software Foundation License",
    "ZPL-2.1",
    "ZPL 2.1",
]

allowed_substrings = [
    "Apache",
    "BSD",
    "Historical Permission Notice and Disclaimer",
    "ISC",
    "LGPL",
    "MIT",
    "MPL",
    "PSF",
    "Python Software Foundation",
    "Unlicense",
    "Unicode",
    "Zope Public",
]

ignored_packages = [
    "codespell",
    "pip",
    "pylint",
    "setuptools",
    "wheel",
]

[parsing]
normalize_pattern = "[-_.]+"
name_pattern = "^\\s*([A-Za-z0-9_.-]+)"
skip_prefixes = [
    "-r",
    "--requirement",
    "-c",
    "--constraint",
    "--extra-index-url",
    "--index-url",
    "--find-links",
    "--trusted-host",
]
editable_prefixes = ["-e", "--editable"]
direct_reference_separator = " @ "
egg_fragment = "#egg="
unknown_licenses = [
    "",
    "dual license",
    "n/a",
    "none",
    "osi approved",
    "unknown",
    "unknown license",
]
license_file_names = ["license", "copying", "notice"]

[package_overrides]

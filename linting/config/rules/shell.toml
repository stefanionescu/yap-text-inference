[shared]
entrypoint_roots = ["scripts", "docker", ".githooks"]
forced_entrypoint_prefixes = [".githooks/hooks/", "linting/security/"]
non_entrypoint_prefixes = ["scripts/lib/", "scripts/config/"]
non_entrypoint_docker_infix = "/scripts/"
hook_entrypoints = [".githooks/pre-commit", ".githooks/pre-push", ".githooks/commit-msg"]

[run]
rule_modules = [
    "linting/shell/rules/strict_mode.py",
    "linting/shell/rules/disable_justification.py",
    "linting/shell/rules/docs.py",
    "linting/shell/rules/function_length.py",
    "linting/shell/rules/unused_functions.py",
    "linting/shell/rules/naming.py",
    "linting/shell/rules/config_defaults.py",
]

[strict_mode]
shebangs = ["#!/usr/bin/env bash", "#!/bin/bash"]
required_line = "set -euo pipefail"
scan_window = 25

[disable_justification]
disable_regex = "^\\s*#\\s*shellcheck\\s+disable="
justification_regex = "#\\s*.+"
scoped_prefixes = [".githooks/", "linting/security/"]

[docs]
function_regex = "^\\s*([A-Za-z_][A-Za-z0-9_]*)\\s*\\(\\)\\s*\\{"
doc_regex = "^#\\s+[A-Za-z_][A-Za-z0-9_]*\\s+[-:]\\s+\\S+"
scoped_prefixes = [".githooks/", "linting/security/"]
ignored_function_names = ["main"]

[unused_functions]
ignored_function_names = ["main", "usage"]

[config_defaults]
scoped_prefixes = ["scripts/", "docker/"]
scan_window = 90
allowed_path_prefixes = [
    "scripts/config",
    "scripts/lib/env",
    "docker/common/scripts/build",
    "docker/tool/scripts/env",
    "docker/trt/scripts/env",
    "docker/vllm/scripts/env",
]
allowed_files = ["scripts/steps/04_env_defaults.sh"]

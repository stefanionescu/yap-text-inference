[no_print_statements]
allowed_prefixes = [
    "src/scripts/",
    "src/hf/",
    "src/quantization/",
]
allowed_exact_paths = ["src/state/hf.py"]

[no_shell_true_subprocess]
forbidden_functions = ["run", "Popen", "call", "check_call", "check_output"]

[no_inline_python]
patterns = [
    "\\bpython3?\\s+-c\\b",
    "\\bpython3?\\s+<<",
    "\\$\\{?PYTHON_EXEC\\}?\\s+-c\\b",
    "\\$\\{?PYTHON_EXEC\\}?\\s+<<",
]

[no_legacy_markers]
targets = [
    "src/runtime",
    "src/messages",
    "src/handlers",
    "src/execution",
    "src/server.py",
]
allowlist = ["src/execution/compat.py"]
patterns = [
    "\\blegacy\\b",
    "\\bdeprecated\\b",
    "\\bworkaround\\b",
    "\\bbackward(?:\\s|-)?compat(?:ible|ibility)\\b",
    "\\bcompatibility\\b",
]

[no_runtime_singletons]
class_suffix = "Singleton"
function_names = ["get_instance", "reset_instance"]
state_names = ["_STATE", "STATE", "_INSTANCE", "INSTANCE"]
